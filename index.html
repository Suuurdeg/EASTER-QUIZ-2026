<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stryktips-quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
    .wrap { width: 100%; max-width: 400px; }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .title { font-size: 24px; font-weight: 600; color: #1a1a1a; }
    .subtitle { font-size: 14px; color: #666; margin-top: 4px; }
    .progress-bar { height: 8px; background: #e0e0d8; border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.4s ease; }
    .card { background: #fff; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .q-label { font-size: 13px; color: #888; margin-bottom: 6px; }
    .q-number { font-size: 32px; font-weight: 600; color: #1a1a1a; margin-bottom: 1.25rem; }
    .btn-row { display: flex; gap: 10px; justify-content: center; }
    .btn { font-size: 22px; font-weight: 600; padding: 14px 0; width: 80px; border: 2px solid #e0e0d8; border-radius: 12px; background: #fff; color: #1a1a1a; cursor: pointer; transition: all 0.15s; }
    .btn:hover { background: #f0f0ea; border-color: #bbb; }
    .btn:active { transform: scale(0.96); }
    .btn.correct { background: #EAF3DE; border-color: #3B6D11; color: #27500A; }
    .btn.wrong { background: #FCEBEB; border-color: #A32D2D; color: #791F1F; animation: shake 0.35s; }
    .hint { text-align: center; font-size: 14px; margin-top: 1rem; height: 20px; font-weight: 500; }
    .hint.ok { color: #27500A; }
    .hint.err { color: #A32D2D; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 1rem; }
    .grid-cell { background: #f5f5f0; border-radius: 10px; padding: 10px 4px; text-align: center; border: 1.5px solid transparent; }
    .grid-cell .n { font-size: 11px; color: #999; display: block; }
    .grid-cell .v { font-size: 16px; font-weight: 600; color: #1a1a1a; display: block; margin-top: 2px; }
    .grid-cell.correct { background: #EAF3DE; border-color: #3B6D11; }
    .grid-cell.correct .n { color: #3B6D11; }
    .grid-cell.correct .v { color: #27500A; }
    .win-screen { text-align: center; }
    .win-emoji { font-size: 56px; }
    .win-title { font-size: 26px; font-weight: 600; margin: 0.75rem 0 0.25rem; color: #1a1a1a; }
    .win-sub { font-size: 15px; color: #666; margin-bottom: 1.5rem; }
    .yt-wrap { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 14px; overflow: hidden; background: #000; }
    .yt-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .reset-btn { margin-top: 1.25rem; font-size: 15px; padding: 10px 28px; border: 1.5px solid #ccc; border-radius: 10px; background: #fff; color: #333; cursor: pointer; }
    .reset-btn:hover { background: #f0f0ea; }
    .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    .dot { position: absolute; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
  </style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
  const ANSWERS = ['X','X','1','2','2','1','X','2','1','X'];
  const YT_ID = 'TElE6-clmVs';
  const COLORS = ['#1D9E75','#D4537E','#378ADD','#EF9F27','#E24B4A','#7F77DD','#639922','#BA7517'];

  let state = { current: 0, results: Array(10).fill(null), phase: 'quiz', lastWrong: false };

  function render() {
    const app = document.getElementById('app');
    if (state.phase === 'win') { renderWin(app); return; }
    const done = state.results.filter(r => r === true).length;
    const qi = state.current;

    let html = `
      <div class="header">
        <div class="title">Stryktips-quiz</div>
        <div class="subtitle">${done} av 10 rätt</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${done/10*100}%"></div></div>
      <div class="card">
        <div class="q-label">Fråga</div>
        <div class="q-number">${qi + 1}</div>
        <div class="btn-row">
          <button class="btn" id="b1" onclick="submitAnswer('1')">1</button>
          <button class="btn" id="bX" onclick="submitAnswer('X')">X</button>
          <button class="btn" id="b2" onclick="submitAnswer('2')">2</button>
        </div>
        <div class="hint ${state.lastWrong ? 'err' : 'ok'}" id="hint">
          ${state.lastWrong ? '✗ Fel – försök igen!' : (done > 0 ? '' : '')}
        </div>
      </div>
      <div class="card">
        <div class="grid">`;

    for (let i = 0; i < 10; i++) {
      const r = state.results[i];
      html += `<div class="grid-cell${r === true ? ' correct' : ''}">
        <span class="n">${i + 1}</span>
        <span class="v">${r === true ? ANSWERS[i] : '—'}</span>
      </div>`;
    }
    html += `</div></div>`;
    app.innerHTML = html;
  }

  function submitAnswer(val) {
    const qi = state.current;
    if (qi >= 10) return;
    const correct = val.toUpperCase() === ANSWERS[qi].toUpperCase();

    if (correct) {
      state.results[qi] = true;
      state.lastWrong = false;
      setTimeout(() => {
        state.current = nextUnanswered();
        if (state.results.every(r => r === true)) {
          state.phase = 'win';
          render();
          launchConfetti();
        } else {
          render();
        }
      }, 600);
      // Flash button green
      const btnMap = {'1':'b1','X':'bX','2':'b2'};
      const el = document.getElementById(btnMap[val]);
      if (el) el.classList.add('correct');
    } else {
      state.lastWrong = true;
      const btnMap = {'1':'b1','X':'bX','2':'b2'};
      const el = document.getElementById(btnMap[val]);
      if (el) { el.classList.add('wrong'); setTimeout(() => el.classList.remove('wrong'), 400); }
      render();
    }
  }

  function nextUnanswered() {
    for (let i = 0; i < 10; i++) { if (state.results[i] !== true) return i; }
    return 10;
  }

  function renderWin(app) {
    app.innerHTML = `
      <div class="card win-screen">
        <div class="win-emoji">🎉</div>
        <div class="win-title">Alla 10 rätt!</div>
        <div class="win-sub">Grattis – här är din belöning!</div>
        <div class="yt-wrap">
          <iframe src="https://www.youtube.com/embed/${YT_ID}?autoplay=1&rel=0"
            allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <button class="reset-btn" onclick="reset()">Spela igen</button>
      </div>`;
  }

  function reset() {
    state = { current: 0, results: Array(10).fill(null), phase: 'quiz', lastWrong: false };
    render();
  }

  function launchConfetti() {
    const c = document.createElement('div');
    c.className = 'confetti-container';
    document.body.appendChild(c);
    for (let i = 0; i < 80; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      const size = 6 + Math.random() * 8;
      d.style.cssText = `left:${Math.random()*100}%;top:-12px;width:${size}px;height:${size}px;background:${COLORS[i%COLORS.length]};border-radius:${Math.random()>0.5?'50%':'3px'};animation-duration:${1.8+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
      c.appendChild(d);
    }
    setTimeout(() => c.remove(), 5000);
  }

  render();
</script>
</body>
</html>
